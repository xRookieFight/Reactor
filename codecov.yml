coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 5%
        paths:
          - "api/src"
          - "plugin/src"
        if_ci_failed: error
        informational: true
        only_pulls: false
    patch:
      default:
        target: auto
        threshold: 5%
        paths:
          - "api/src"
          - "plugin/src"
        if_ci_failed: error
        informational: true
        only_pulls: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
