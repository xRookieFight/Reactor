name: Bug report
description: Report a problem with Reactor
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How to trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: reactor-version
    attributes:
      label: Reactor version
    validations:
      required: true
  - type: input
    id: pnx-version
    attributes:
      label: PowerNukkitX version
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output or stack traces.
      render: shell
